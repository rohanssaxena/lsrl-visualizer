<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LSRL Visualizer — Documentation</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080811;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --border-bright: rgba(255,255,255,0.18);
      --text: #eeeeff;
      --muted: #8888aa;
      --faint: #55556e;
      --purple: #7c5cfc;
      --cyan: #06d6a0;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    #docs-root { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    #docs-top {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    #docs-top a {
      font-size: 12px;
      font-weight: 600;
      color: var(--cyan);
      text-decoration: none;
      white-space: nowrap;
    }
    #docs-top a:hover { text-decoration: underline; }
    #docs-search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 560px;
      margin-left: auto;
    }
    #docs-search-wrap label { font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
    #docs-search {
      flex: 1;
      min-width: 0;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-bright);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
    }
    #docs-search::placeholder { color: var(--faint); }
    #docs-search:focus { border-color: var(--purple); }
    #docs-body { flex: 1; display: flex; min-height: 0; }
    #docs-sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      padding: 10px 0;
    }
    .docs-nav-title { font-size: 9px; font-weight: 600; letter-spacing: 1.2px; color: var(--faint); text-transform: uppercase; padding: 8px 16px 6px; }
    .docs-nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 9px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .docs-nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .docs-nav-item.active { color: var(--text); border-left-color: var(--purple); background: rgba(124,92,252,0.1); }
    .docs-nav-item.hidden { display: none; }
    .docs-nav-empty { padding: 16px; font-size: 12px; color: var(--faint); }
    #docs-main { flex: 1; min-width: 0; overflow-y: auto; padding: 28px 40px 48px; user-select: text; }
    #docs-content {
      max-width: 820px;
      font-size: 15px;
      line-height: 1.65;
      color: #d8d8e8;
    }
    #docs-content h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.75em; color: var(--text); letter-spacing: -0.02em; }
    #docs-content h2 { font-size: 1.2rem; font-weight: 600; margin: 1.5em 0 0.5em; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.35em; }
    #docs-content h3 { font-size: 1.05rem; font-weight: 600; margin: 1.25em 0 0.4em; color: #c8c8e0; }
    #docs-content p { margin: 0.65em 0; }
    #docs-content ul, #docs-content ol { margin: 0.65em 0 0.65em 1.25em; }
    #docs-content li { margin: 0.35em 0; }
    #docs-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; background: rgba(124,92,252,0.15); padding: 0.12em 0.4em; border-radius: 4px; color: #e8e0ff; }
    #docs-content pre { margin: 1em 0; padding: 14px 16px; border-radius: 8px; background: rgba(0,0,0,0.35); border: 1px solid var(--border); overflow-x: auto; }
    #docs-content pre code { background: none; padding: 0; color: #c4b5fd; font-size: 0.82em; }
    #docs-content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.92em; }
    #docs-content th, #docs-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    #docs-content th { background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    #docs-content strong { color: #fff; font-weight: 600; }
    #docs-content a { color: var(--cyan); }
    #docs-err { max-width: 820px; padding: 16px; border-radius: 8px; background: rgba(255,77,136,0.12); border: 1px solid rgba(255,77,136,0.35); color: #ffb4c4; font-size: 14px; display: none; }
    #docs-err.visible { display: block; }
  </style>
</head>
<body>
  <div id="docs-root">
    <header id="docs-top">
      <a href="/">← Back to LSRL Visualizer</a>
      <div id="docs-search-wrap">
        <label for="docs-search">Search</label>
        <input type="search" id="docs-search" placeholder="Filter pages by title or content…" autocomplete="off" />
      </div>
    </header>
    <div id="docs-body">
      <aside id="docs-sidebar">
        <div class="docs-nav-title">Pages</div>
        <div id="docs-nav-list"></div>
      </aside>
      <main id="docs-main">
        <div id="docs-err"></div>
        <article id="docs-content"></article>
      </main>
    </div>
  </div>
  <script>
    const DOC_PAGES = [
      { id: 'start', title: 'Getting started', path: '/docs/getting-started.md' },
      { id: 'data', title: 'Data input format', path: '/docs/data-input.md' },
      { id: 'loss', title: 'Loss functions', path: '/docs/loss-functions.md' },
      { id: 'gd', title: 'Gradient descent', path: '/docs/gradient-descent.md' },
    ];

    const cache = {};
    let activeId = null;
    let searchQuery = '';

    function parseMd(raw) {
      if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
        return marked.parse(raw);
      }
      if (typeof marked === 'function') return marked(raw);
      return '<pre>' + String(raw).replace(/</g, '&lt;') + '</pre>';
    }

    function showErr(msg) {
      const el = document.getElementById('docs-err');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideErr() {
      document.getElementById('docs-err').classList.remove('visible');
    }

    function matchesQuery(page, q) {
      if (!q) return true;
      const t = (page.title + '\n' + (cache[page.path] || '')).toLowerCase();
      return t.includes(q);
    }

    function renderNav() {
      const q = searchQuery.trim().toLowerCase();
      const list = document.getElementById('docs-nav-list');
      list.innerHTML = '';
      let any = false;
      DOC_PAGES.forEach((page) => {
        const ok = matchesQuery(page, q) || page.id === activeId;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'docs-nav-item' + (page.id === activeId ? ' active' : '') + (ok ? '' : ' hidden');
        btn.textContent = page.title;
        btn.dataset.id = page.id;
        btn.addEventListener('click', () => loadDoc(page.id));
        list.appendChild(btn);
        if (ok) any = true;
      });
      if (!any) {
        const p = document.createElement('div');
        p.className = 'docs-nav-empty';
        p.textContent = 'No pages match your search.';
        list.appendChild(p);
      }
    }

    async function ensureCached(page) {
      if (cache[page.path] != null) return;
      const res = await fetch(page.path);
      if (!res.ok) throw new Error('Could not load ' + page.path + ' (' + res.status + ')');
      cache[page.path] = await res.text();
    }

    async function loadDoc(id) {
      const page = DOC_PAGES.find((p) => p.id === id);
      if (!page) return;
      hideErr();
      activeId = id;
      try {
        await ensureCached(page);
        document.getElementById('docs-content').innerHTML = parseMd(cache[page.path]);
        history.replaceState(null, '', '#/' + id);
      } catch (e) {
        showErr(e.message || String(e));
        document.getElementById('docs-content').innerHTML = '';
      }
      renderNav();
    }

    async function preloadAll() {
      await Promise.all(
        DOC_PAGES.map((p) =>
          ensureCached(p).catch((err) => {
            console.error(err);
          }),
        ),
      );
    }

    document.getElementById('docs-search').addEventListener('input', function () {
      searchQuery = this.value;
      renderNav();
    });

    window.addEventListener('hashchange', () => {
      const m = /^#\/?(.+)$/.exec(location.hash);
      const id = m ? m[1] : 'start';
      if (DOC_PAGES.some((p) => p.id === id)) loadDoc(id);
    });

    (async function init() {
      await preloadAll();
      renderNav();
      const m = /^#\/?(.+)$/.exec(location.hash);
      const startId = m && DOC_PAGES.some((p) => p.id === m[1]) ? m[1] : 'start';
      await loadDoc(startId);
    })();
  </script>
</body>
</html>
